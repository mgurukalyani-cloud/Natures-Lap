<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rivers & Animals</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(120deg,#134e5e,#71b280);
font-family:Arial;
}

.container-main{
margin-top:80px;
}

/* CARD */
.card-box{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:.4s;
height:100%;
}

.card-box:hover{
transform:translateY(-8px);
}

.nature-img{
height:220px;
width:100%;
object-fit:cover;
border-radius:10px;
}

/* FACT BOX */
.fact{
margin-top:10px;
margin-bottom:15px;
background:#e8f5e9;
color:#145c32;
padding:12px;
border-radius:8px;
font-weight:bold;
display:none;
animation:fade .5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* TRANSITION */
.transition{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#198754;
z-index:9999;
transform:scaleY(0);
transform-origin:bottom;
transition:.6s;
}

.transition.active{
transform:scaleY(1);
}

/* BACK BUTTON */
.back-container{
text-align:center;
margin-top:60px;
margin-bottom:40px;
}

.back-button{
background:#198754;
color:white;
padding:12px 30px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.back-button:hover{
background:#145c32;
transform:scale(1.05);
}

</style>
</head>

<body>

<!-- PAGE TRANSITION -->
<div class="transition" id="transition"></div>

<div class="container container-main">

<h1 class="text-center text-white mb-5">
Rivers & Village Animals 🌊🐄
</h1>

<div class="row g-4">

<!-- ================= RIVERS ================= -->
<div class="col-md-6">
<div class="card-box text-center">

<h3>🌊 Rivers of India</h3>

<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470"
class="nature-img">

<p class="mt-3">
Rivers are lifelines of Indian civilization and agriculture.
</p>

<!-- VERTICAL BUTTON AREA -->
<div class="d-flex flex-column align-items-center">

<button class="btn btn-success mb-3"
onclick="riverFact()">
River Fact
</button>

<p id="rfact" class="fact"></p>

<a href="rivers.html"
onclick="navigate(event,'rivers.html')"
class="btn btn-outline-success">
Explore Rivers →
</a>

</div>

</div>
</div>

<!-- ================= ANIMALS ================= -->
<div class="col-md-6">
<div class="card-box text-center">

<h3>🐄 Village Animals</h3>

<img src="https://thumbs.dreamstime.com/z/cows-village-banglade-bangladesh-187414131.jpg"
class="nature-img">

<p class="mt-3">
Animals play a vital role in rural livelihood.
</p>

<div class="d-flex flex-column align-items-center">

<button class="btn btn-success mb-3"
onclick="animalFact()">
Animal Fact
</button>

<p id="afact" class="fact"></p>

<a href="animals.html"
onclick="navigate(event,'animals.html')"
class="btn btn-outline-success">
Explore Animals →
</a>

</div>

</div>
</div>

</div>

<!-- BACK BUTTON -->
<div class="back-container">
<a href="villages.html" class="back-button">
⬅ Back to Explore Villages
</a>
</div>

</div>

<script>

/* FACT DATA */
const rivers=[
"Ganga river basin supports nearly 40% of India's population.",
"Indian villages depend on rivers for irrigation.",
"Ancient civilizations developed near river banks."
];

const animals=[
"Cows provide milk and organic manure.",
"Buffaloes help farmers in agriculture.",
"Goats are an important rural income source."
];

/* SHOW FACTS */
function riverFact(){
let fact=document.getElementById("rfact");
fact.style.display="block";
fact.innerHTML=
rivers[Math.floor(Math.random()*rivers.length)];
}

function animalFact(){
let fact=document.getElementById("afact");
fact.style.display="block";
fact.innerHTML=
animals[Math.floor(Math.random()*animals.length)];
}

/* PAGE TRANSITION */
function navigate(e,page){
e.preventDefault();

document.getElementById("transition")
.classList.add("active");

setTimeout(()=>{
window.location.href=page;
},600);
}

</script>

</body>
</html>
